[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"

[tool.coverage.run]
branch = true
source = ["app", "scripts"]
data_file = "output/.coverage"

[tool.coverage.report]
show_missing = true
skip_covered = true
precision = 1
fail_under = 60
exclude_also = [
    "if __name__ == .__main__.:",
]
